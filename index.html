<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffe6f0;
    font-family:Arial;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:350px;
}

#countdown{
    font-size:20px;
    font-weight:bold;
    color:#ff2e7a;
    margin:15px 0;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.yes{
    background:#ff2e7a;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>Will you go on a date? 💖</h1>

<h2 id="countdown">Loading...</h2>

<button class="yes" onclick="window.location.href='yes.html'">
YES
</button>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    // 🔥 KËTU NDRYSHO DATËN
    const targetDate = new Date("2026-07-01T18:00:00").getTime();

    function update(){

        const now = new Date().getTime();
        const distance = targetDate - now;

        if(distance <= 0){
            document.getElementById("countdown").innerHTML =
            "❤️ IT'S DATE TIME ❤️";
            return;
        }

        const days = Math.floor(distance / (1000*60*60*24));
        const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
        const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
        const seconds = Math.floor((distance % (1000*60)) / 1000);

        document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    update();
    setInterval(update, 1000);

});

</script>

</body>
</html>
