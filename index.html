<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe6f0,#fff0f6);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    max-width:450px;
}

img{
    width:180px;
    border-radius:20px;
    margin-bottom:15px;
}

h1{
    color:#d63384;
    margin-bottom:15px;
}

#countdown{
    margin:15px 0;
    color:#ff4d88;
    font-weight:bold;
}

button{
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    margin:10px;
    transition:.3s;
}

.yes{
    background:#ff4d88;
    color:white;
}

.yes:hover{
    transform:scale(1.1);
}

.no{
    background:#ddd;
}

.heart{
    position:absolute;
    color:#ff4d88;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<div class="card">

<img src="https://media.tenor.com/8M7n7x4kT7AAAAAC/cute-cat.gif" alt="Cute Cat">

<h1>🌸 Will you go on a date with me? 🌸</h1>

<h3 id="countdown"></h3>

<button class="yes" onclick="window.location.href='yes.html'">
YES 💖
</button>

<button class="no" id="no">
NO 😔
</button>

</div>

<script>

// Ndrysho datën sipas dëshirës
const targetDate = new Date("July 1, 2026 18:00:00").getTime();

setInterval(() => {

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance/(1000*60*60*24));
    const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
    `⏳ Date in: ${days} days ${hours}h ${minutes}m`;

},1000);

// NO button ikën
const noBtn = document.getElementById("no");

function moveButton(){

    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

// Zemra që bien
function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = Math.random()*20 + 15 + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
