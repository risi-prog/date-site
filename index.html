<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffe6f0;
    font-family:Arial;
}

.card{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

.yes{background:#ff2e7a;color:white;}
.no{background:#ddd;}
</style>
</head>

<body>

<div class="card">
<h1>Will you go on a date? 💖</h1>

<button class="yes" onclick="window.location.href='yes.html'">
YES 💖
</button>

<button class="no" id="noBtn">
NO 😔
</button>
</div>

<script>
// NO ikën
const noBtn = document.getElementById("noBtn");

function move(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.position="fixed";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover", move);
noBtn.addEventListener("click", move);
</script>

</body>
</html>
